<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Starting Block — Daily Trivia</title>

  <!-- WhatsApp / Social OG Tags -->
  <meta property="og:title" content="Starting Block — Daily Trivia">
  <meta property="og:description" content="Test your knowledge. Running. Football. Music. Cities. One question a day.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://startingblock.netlify.app">
  <meta property="og:image" content="https://startingblock.netlify.app/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Starting Block — Daily Trivia">
  <meta name="twitter:description" content="Test your knowledge. Running. Football. Music. Cities. One question a day.">
  <meta name="twitter:image" content="https://startingblock.netlify.app/og-image.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00FFD1;
      --magenta: #FF006B;
      --yellow: #FFFF00;
      --deep-black: #0A0A0A;
      --charcoal: #1A1A1A;
      --purple-dark: #1A0A3E;
      --white: #FFFFFF;
      --light-grey: #B0B0B0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--deep-black);
      color: var(--white);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 8px;
      width: 100%;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 24px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .logo .highlight {
      background: linear-gradient(90deg, var(--cyan), var(--magenta), var(--yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      color: var(--light-grey);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin: 16px 0 24px;
      width: 100%;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--cyan);
    }

    .stat-label {
      font-size: 10px;
      color: var(--light-grey);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* Category pill */
    .category-pill {
      display: inline-block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--magenta);
      color: var(--magenta);
      margin-bottom: 20px;
    }

    /* Question */
    .question-card {
      background: var(--charcoal);
      border-radius: 16px;
      padding: 28px 20px;
      width: 100%;
      margin-bottom: 20px;
    }

    .question-number {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      color: var(--cyan);
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .question-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.4;
    }

    /* Options */
    .options {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .option-btn {
      width: 100%;
      padding: 16px 20px;
      border-radius: 12px;
      border: 1.5px solid #333;
      background: var(--charcoal);
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
      -webkit-appearance: none;
      appearance: none;
    }

    .option-btn:active {
      transform: scale(0.98);
    }

    .option-btn:not(.answered):hover {
      border-color: var(--cyan);
    }

    .option-btn.correct {
      border-color: var(--cyan);
      background: rgba(0, 255, 209, 0.12);
      color: var(--cyan);
    }

    .option-btn.incorrect {
      border-color: var(--magenta);
      background: rgba(255, 0, 107, 0.12);
      color: var(--magenta);
    }

    .option-btn.answered {
      cursor: default;
      opacity: 0.5;
    }

    .option-btn.correct.answered,
    .option-btn.incorrect.answered {
      opacity: 1;
    }

    /* Fun fact */
    .fun-fact {
      width: 100%;
      background: var(--charcoal);
      border-left: 3px solid var(--yellow);
      border-radius: 0 12px 12px 0;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: none;
    }

    .fun-fact.show {
      display: block;
    }

    .fun-fact-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      color: var(--yellow);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .fun-fact-text {
      font-size: 14px;
      line-height: 1.5;
      color: var(--light-grey);
    }

    /* Result */
    .result-section {
      width: 100%;
      text-align: center;
      display: none;
    }

    .result-section.show {
      display: block;
    }

    .result-emoji {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .result-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .result-text .neon {
      color: var(--cyan);
    }

    .result-text .miss {
      color: var(--magenta);
    }

    /* Share button */
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(90deg, var(--cyan), var(--magenta));
      color: var(--deep-black);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    .share-btn:active {
      transform: scale(0.96);
    }

    .share-btn.copied {
      background: var(--cyan);
    }

    /* Countdown */
    .countdown {
      margin-top: 24px;
      text-align: center;
    }

    .countdown-label {
      font-size: 11px;
      color: var(--light-grey);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .countdown-time {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--white);
    }

    /* Already played state */
    .already-played {
      display: none;
      text-align: center;
      width: 100%;
    }

    .already-played.show {
      display: block;
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--magenta));
      margin: 24px auto;
      border-radius: 2px;
    }

    /* Footer */
    .footer {
      margin-top: auto;
      padding-top: 32px;
      text-align: center;
    }

    .footer-text {
      font-size: 11px;
      color: #555;
      letter-spacing: 1px;
    }

    .footer-text a {
      color: var(--cyan);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">STARTING <span class="highlight">BLOCK</span></div>
      <div class="tagline">Daily Trivia</div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="streak">0</div>
        <div class="stat-label">Streak</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="played">0</div>
        <div class="stat-label">Played</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="pct">0%</div>
        <div class="stat-label">Correct</div>
      </div>
    </div>

    <!-- Game area -->
    <div id="game-area">
      <div style="text-align:center">
        <span class="category-pill" id="category"></span>
      </div>

      <div class="question-card">
        <div class="question-number" id="q-number"></div>
        <div class="question-text" id="q-text"></div>
      </div>

      <div class="options" id="options"></div>

      <div class="fun-fact" id="fun-fact">
        <div class="fun-fact-label">Did you know?</div>
        <div class="fun-fact-text" id="fun-fact-text"></div>
      </div>

      <div class="result-section" id="result-section">
        <div class="result-emoji" id="result-emoji"></div>
        <div class="result-text" id="result-text"></div>
        <button class="share-btn" id="share-btn" onclick="shareResult()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Share
        </button>
        <div class="countdown">
          <div class="countdown-label">Next question in</div>
          <div class="countdown-time" id="countdown"></div>
        </div>
      </div>
    </div>

    <!-- Already played (shown on revisit same day) -->
    <div class="already-played" id="already-played">
      <div class="question-card">
        <div class="question-number" id="ap-q-number"></div>
        <div class="question-text" id="ap-q-text"></div>
      </div>

      <div id="ap-answer" style="margin-bottom: 16px;"></div>

      <div class="fun-fact show" id="ap-fun-fact">
        <div class="fun-fact-label">Did you know?</div>
        <div class="fun-fact-text" id="ap-fun-fact-text"></div>
      </div>

      <div class="result-section show">
        <div class="result-emoji" id="ap-result-emoji"></div>
        <div class="result-text" id="ap-result-text"></div>
        <button class="share-btn" id="ap-share-btn" onclick="shareResult()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Share
        </button>
        <div class="countdown">
          <div class="countdown-label">Next question in</div>
          <div class="countdown-time" id="ap-countdown"></div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-text">A <a href="https://fridaynightlights.run" target="_blank">Friday Night Lights</a> thing</div>
    </div>
  </div>

  <script src="questions.js"></script>
  <script src="game.js"></script>
</body>
</html>
